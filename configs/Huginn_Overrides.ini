; =============================================================================
; Huginn Item Classification Overrides
; =============================================================================
; Copy this file to: Data/SKSE/Plugins/Huginn_Overrides.ini
;
; Use this file to override item classifications for modded potions, foods,
; and other consumables that aren't automatically classified correctly.
;
; SYNTAX:
;   [ItemName] or [FormID]
;   type = ItemType
;   tags = Tag1,Tag2,Tag3
;
; ITEM TYPES:
;   HealthPotion    - Restore health
;   MagickaPotion   - Restore magicka
;   StaminaPotion   - Restore stamina
;   ResistPotion    - Resist fire/frost/shock/poison/magic
;   BuffPotion      - Fortify attribute/skill
;   CurePotion      - Cure disease/poison
;   Poison          - Hostile (apply to weapon)
;   Food            - CC Survival Mode food
;   Alcohol         - Alcoholic beverages (ale, mead, wine, skooma)
;   Ingredient      - Raw alchemy ingredient
;   SoulGem         - Soul gem for weapon recharge
;
; TAGS (comma-separated):
;   RestoreHealth, RestoreMagicka, RestoreStamina
;   ResistFire, ResistFrost, ResistShock, ResistMagic, ResistPoison
;   FortifyHealth, FortifyMagicka, FortifyStamina
;   FortifyMagicSchool, FortifyCombatSkill, FortifyUtilitySkill
;   RegenHealth, RegenMagicka, RegenStamina
;   CureDisease, CurePoison
;   Invisibility, Waterbreathing, FortifyCarryWeight
;   DamageHealth, DamageMagicka, DamageStamina
;   Paralyze, Slow, Fear, Frenzy
;   SatisfiesHunger, SatisfiesCold
;
; =============================================================================

; =============================================================================
; EXAMPLE: Modded Health Potions
; =============================================================================
; Use this section to force items to be classified as health potions.
; Useful when mods add potions that don't use standard effect archetypes.

; [Potion of Greater Healing]
; type = HealthPotion
; tags = RestoreHealth

; [Elixir of Restoration]
; type = HealthPotion
; tags = RestoreHealth,RegenHealth

; =============================================================================
; EXAMPLE: FormID-based Override
; =============================================================================
; Use FormID when multiple items share the same name.
; Format: 8-digit hex (e.g., 00012345) or with 0x prefix (0x00012345)
; Note: For mod items, use the local FormID (without load order prefix)

; [0x00012345]
; type = MagickaPotion
; tags = RestoreMagicka

; =============================================================================
; EXAMPLE: Survival Mode Foods (CC or mods)
; =============================================================================
; Foods that should satisfy hunger/cold in survival mode.

; [Warm Stew]
; type = Food
; tags = SatisfiesHunger,SatisfiesCold

; [Venison Chop]
; type = Food
; tags = SatisfiesHunger

; =============================================================================
; EXAMPLE: Resist Potions
; =============================================================================

; [Potion of Fire Warding]
; type = ResistPotion
; tags = ResistFire

; [Elemental Shield Draught]
; type = ResistPotion
; tags = ResistFire,ResistFrost,ResistShock

; =============================================================================
; EXAMPLE: Buff/Fortify Potions
; =============================================================================

; [Blacksmith's Philter]
; type = BuffPotion
; tags = FortifyCombatSkill

; [Philter of the Mage]
; type = BuffPotion
; tags = FortifyMagicSchool

; [Potion of Plunder]
; type = BuffPotion
; tags = FortifyUtilitySkill

; =============================================================================
; EXAMPLE: Poisons
; =============================================================================

; [Nerve Toxin]
; type = Poison
; tags = Paralyze,DamageStamina

; [Frenzy Poison]
; type = Poison
; tags = Frenzy

; =============================================================================
; LORERIM / REQUIEM EXAMPLES
; =============================================================================
; Lorerim and Requiem often rename or modify potions. Add overrides here
; if items aren't being classified correctly.

; [Regeneration Draught]
; type = HealthPotion
; tags = RegenHealth

; [Battlemage's Elixir]
; type = BuffPotion
; tags = FortifyMagicSchool,FortifyHealth

; =============================================================================
; APOCALYPSE / TRIUMVIRATE ITEM EXAMPLES
; =============================================================================
; Some spell mods add consumable items that need classification.

; [Scroll of Bolide]
; type = Scroll
; tags = DamageFire

; =============================================================================
; EXAMPLE: Alcohol / Drinks
; =============================================================================
; Items auto-detected as alcohol: ale, mead, wine, skooma, beer, brandy,
; mazte, flin, shein, jagga, rotmeth. Also detected via mod keywords:
; VendorItemAlcohol, CACO_IsAlcohol, VendorItemSkooma.
; Use overrides for drinks not caught by auto-detection.

; [Emberbrew]
; type = Alcohol

; [Stumbling Sabrecat]
; type = Alcohol
; tags = SatisfiesHunger

; =============================================================================
; YOUR CUSTOM OVERRIDES BELOW
; =============================================================================

