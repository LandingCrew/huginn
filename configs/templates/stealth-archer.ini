; =============================================================================
; TEMPLATE: Stealth Archer
; =============================================================================
; Sneak-focused ranged build. Bow is king, poison is your friend, and a
; dagger is there for when things go wrong. Ammo tracking and poison swaps
; are the priority — you don't want to run dry mid-fight.
;
; Page 0: Combat — Bow + poison + emergency backup
; Page 1: Stealth & Prep — Buffs, utility, potions
; =============================================================================

[Pages]
iPageCount=2

; =============================================================================
; PAGE 0 — Combat
; =============================================================================
; Ranged weapon always in slot 0. Poisons and ammo rotate based on context
; (fire poison for trolls, paralysis for dragons landing, etc.)

[Page0]
sName=Combat
iSlotCount=6

; Primary ranged weapon (bow/crossbow)
[Page0.Slot0]
sClassification=WeaponsRanged
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=6

; Ammo — arrows/bolts, auto-swaps when running low
[Page0.Slot1]
sClassification=AmmoAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=5

; Damage poisons, scrolls — apply to weapon
[Page0.Slot2]
sClassification=DamageAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=4

; Backup melee for when enemies close in
[Page0.Slot3]
sClassification=WeaponsMelee
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=3

; Healing — HP override for emergencies (archers are squishy)
[Page0.Slot4]
sClassification=HealingAny
bWildcardsEnabled=false
bOverridesEnabled=HP
iPriority=5

; Flex — could be a shout substitute, scroll, or situational pick
[Page0.Slot5]
sClassification=Regular
bWildcardsEnabled=true
bOverridesEnabled=SP
iPriority=1

; =============================================================================
; PAGE 1 — Stealth & Prep
; =============================================================================
; Pre-engagement buffs and sneaking tools. Muffle, invisibility, and
; fortify marksman potions live here.

[Page1]
sName=Stealth
iSlotCount=6

; Invisibility, muffle, armor buffs
[Page1.Slot0]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=6

; Second buff slot (fortify marksman potion, etc.)
[Page1.Slot1]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=5

; Potions — resist, fortify, restore
[Page1.Slot2]
sClassification=PotionsAny
bWildcardsEnabled=false
bOverridesEnabled=MP
iPriority=4

; Utility — detect life, light (for dark dungeons)
[Page1.Slot3]
sClassification=Utility
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=3

; Scrolls for one-off utility
[Page1.Slot4]
sClassification=ScrollsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=2

; Open slot
[Page1.Slot5]
sClassification=Regular
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=1
