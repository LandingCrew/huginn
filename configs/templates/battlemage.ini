; =============================================================================
; TEMPLATE: Battlemage
; =============================================================================
; Melee combat backed by destruction magic. Switches between sword and spell
; fluidly — damage spells for openers and AOE, weapons for sustained DPS.
; HP override on the healing slot keeps you alive when you're in the thick of it.
;
; Page 0: Combat — Destruction + melee + emergency healing
; Page 1: Buffs & Utility — Pre-fight prep and exploration tools
; =============================================================================

[Pages]
iPageCount=2

; =============================================================================
; PAGE 0 — Combat
; =============================================================================
; Primary wheel for active combat. Destruction spells up top, melee weapon
; always available, healing pinned with HP override for emergencies.

[Page0]
sName=Combat
iSlotCount=6

; Lead with your best destruction spell
[Page0.Slot0]
sClassification=DamageAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=6

; Second damage slot for scroll/poison variety
[Page0.Slot1]
sClassification=DamageAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=5

; Melee weapon — always have your sword ready
[Page0.Slot2]
sClassification=WeaponsMelee
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=6

; Healing — HP override forces a potion here when you're critical
[Page0.Slot3]
sClassification=HealingAny
bWildcardsEnabled=false
bOverridesEnabled=HP
iPriority=5

; Defensive ward or resist spell when taking elemental damage
[Page0.Slot4]
sClassification=DefensiveAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=3

; Flex slot — summon, scroll, whatever the situation calls for
[Page0.Slot5]
sClassification=Regular
bWildcardsEnabled=true
bOverridesEnabled=MP
iPriority=1

; =============================================================================
; PAGE 1 — Buffs & Utility
; =============================================================================
; Pre-combat buffs and exploration tools. Cycle here before a fight to
; armor up, then switch back to Combat for the action.

[Page1]
sName=Buffs
iSlotCount=6

; Armor/cloak/fortify spells
[Page1.Slot0]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=6

; Second buff slot for stacking
[Page1.Slot1]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=5

; Buff potions (fortify, resist)
[Page1.Slot2]
sClassification=PotionsAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=4

; Utility spells (light, detect, unlock)
[Page1.Slot3]
sClassification=Utility
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=3

; Ammo for backup ranged
[Page1.Slot4]
sClassification=AmmoAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=2

; Open slot for whatever else surfaces
[Page1.Slot5]
sClassification=Regular
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=1
