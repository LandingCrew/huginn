; =============================================================================
; TEMPLATE: Pure Mage
; =============================================================================
; Full caster — no weapons, all spell schools. Juggles destruction, healing,
; buffs, summons, and utility. Magicka management is critical, so MP override
; is pinned to keep a magicka potion ready.
;
; Page 0: Offense — Destruction + summons for dealing damage
; Page 1: Defense — Healing, wards, buffs, and recovery
; Page 2: Utility — Exploration and non-combat spells
; =============================================================================

[Pages]
iPageCount=3

