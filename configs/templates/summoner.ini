; =============================================================================
; TEMPLATE: Summoner
; =============================================================================
; Conjuration-focused build. Summons do your fighting — you hang back and
; support with buffs, heals, and the occasional bound weapon. Multiple
; summon slots let Huginn pick the best creature for the situation.
;
; Page 0: Summons & Combat — Your army + bound weapons
; Page 1: Support — Healing, buffs, potions
; =============================================================================

[Pages]
iPageCount=2

; =============================================================================
; PAGE 0 — Summons & Combat
; =============================================================================
; Three summon slots to cover different situations (frost atronach for
; tanks, dremora for DPS, etc.). Bound weapon for personal combat.

[Page0]
sName=Summons
iSlotCount=6

; Primary summon — highest-level conjuration
[Page0.Slot0]
sClassification=SummonsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=6

; Secondary summon (Twin Souls or situational pick)
[Page0.Slot1]
sClassification=SummonsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=5

; Third summon — variety for different enemy types
[Page0.Slot2]
sClassification=SummonsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=4

; Bound weapon for personal engagement
[Page0.Slot3]
sClassification=WeaponsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=3

; Damage spell/scroll for finishing off weak enemies
[Page0.Slot4]
sClassification=DamageAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=2

; Magicka potion — summons are expensive
[Page0.Slot5]
sClassification=PotionsAny
bWildcardsEnabled=false
bOverridesEnabled=MP
iPriority=5

; =============================================================================
; PAGE 1 — Support
; =============================================================================
; Stay alive while your summons do the work. Healing, wards, and buffs
; to keep yourself protected.

[Page1]
sName=Support
iSlotCount=6

