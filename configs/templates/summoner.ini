[Page1.Slot2]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=4

; Second buff for stacking
[Page1.Slot3]
sClassification=BuffsAny
bWildcardsEnabled=true
bOverridesEnabled=None
iPriority=3

; Utility — detect, light, waterbreathing
[Page1.Slot4]
