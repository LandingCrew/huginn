; =============================================================================
; TEMPLATE: Paladin
; =============================================================================
; Tank/healer hybrid — heavy armor, restoration magic, melee weapons.
; Multiple healing slots with HP overrides keep you standing. Buff slots
; for armor spells and turn undead. Built for Dawnguard and dungeon delving.
;
; Page 0: Combat — Melee + healing + turn undead
; Page 1: Auras & Prep — Buffs, wards, potions
; =============================================================================

[Pages]
iPageCount=2

; =============================================================================
; PAGE 0 — Combat
; =============================================================================
; Melee weapon + restoration. Two healing slots with HP override so you
; always have something ready when health drops.

