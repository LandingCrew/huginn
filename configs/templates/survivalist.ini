; =============================================================================
; TEMPLATE: Survivalist (CC Survival Mode)
; =============================================================================
; Built for Creation Club Survival Mode. Food, warmth, and stamina management
; are first-class concerns. Potions and food get dedicated slots so you never
; starve in a blizzard. Lighter on combat — you pick your fights carefully.
;
; Page 0: Survival — Food, potions, warmth
; Page 1: Combat — Weapons + basic offense/defense
; Page 2: Exploration — Utility and buffs for the road
; =============================================================================

[Pages]
iPageCount=3

; =============================================================================
; PAGE 0 — Survival
; =============================================================================
; Dedicated food and potion management. HP/SP overrides ensure you always
; have a health potion and stamina restore ready.

[Page0]
sName=Survival
iSlotCount=6

; Food — keeps hunger at bay
[Page0.Slot0]
sClassification=FoodAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=6

; Second food slot for variety (hot soup for warmth, etc.)
[Page0.Slot1]
sClassification=FoodAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=5

; Health potion — HP override for emergencies
[Page0.Slot2]
sClassification=HealingAny
bWildcardsEnabled=false
bOverridesEnabled=HP
iPriority=6

; Stamina restore — SP override for sprinting/carry weight
[Page0.Slot3]
sClassification=PotionsAny
bWildcardsEnabled=false
bOverridesEnabled=SP
iPriority=5

; Resist potions (cold resist, fire resist for warmth)
[Page0.Slot4]
sClassification=DefensiveAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=3

; Buff potions (fortify carry weight, fortify stamina)
[Page0.Slot5]
sClassification=PotionsAny
bWildcardsEnabled=false
bOverridesEnabled=None
iPriority=2

; =============================================================================
