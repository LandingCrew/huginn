; =============================================================================
; Huginn Configuration File
; =============================================================================
; Copy this file to: Data/SKSE/Plugins/Huginn.ini
; Settings are reloaded each time you load a save.
; Hot-reload in-game: open console (~) and type "hg reload"
; =============================================================================

[Overrides]
; =============================================================================
; CRITICAL HEALTH OVERRIDE
; =============================================================================
; When health drops below threshold, a health potion is forced into slot 1.
; Values are percentages as decimals (0.10 = 10%, 0.25 = 25%)

bEnableCriticalHealth = true
fCriticalHealthThreshold = 0.35
fCriticalHealthHysteresis = 0.15

; =============================================================================
; CRITICAL MAGICKA OVERRIDE
; =============================================================================
; When magicka drops below threshold, a magicka potion is forced into slot 1.

bEnableCriticalMagicka = true
fCriticalMagickaThreshold = 0.35
fCriticalMagickaHysteresis = 0.15

; =============================================================================
; CRITICAL STAMINA OVERRIDE
; =============================================================================
; When stamina drops below threshold, a stamina potion is forced into slot 1.

bEnableCriticalStamina = true
fCriticalStaminaThreshold = 0.35
fCriticalStaminaHysteresis = 0.15

; =============================================================================
; POTION SELECTION
; =============================================================================
; bAllowImpurePotions: When true, potions with harmful side effects (e.g., Skooma)
;   are used as a last resort if no pure potions are available.
bAllowImpurePotions = true

; =============================================================================
; WEAPON CHARGE OVERRIDE
; =============================================================================
; When enchanted weapon (including staves) charge drops below threshold,
; a filled soul gem is forced into slot 1.

bEnableWeaponCharge = true
fWeaponChargeThreshold = 0.0
fWeaponChargeHysteresis = 0.05

; =============================================================================
; LOW AMMO OVERRIDE
; =============================================================================
; When equipped bow/crossbow ammo drops below threshold, the best available
; ammo from inventory is surfaced. Values are absolute counts.

bEnableLowAmmo = true
fLowAmmoThreshold = 10
fLowAmmoHysteresis = 15

; =============================================================================
; ANTI-FLICKER SETTINGS
; =============================================================================
; Once an override activates, it stays active for at least this duration
; to prevent rapid visual changes when values hover near thresholds.

fMinOverrideDurationMs = 2000

; =============================================================================
; DROWNING OVERRIDE
; =============================================================================
; When underwater without waterbreathing buff, suggests waterbreathing potion.

bEnableDrowning = true


[Candidates]
; =============================================================================
; UNCASTABLE SPELL HANDLING
; =============================================================================
; sUncastableSpellPolicy:
;   Disallow  - Filter out uncastable spells entirely (default)
;   Penalize  - Keep but reduce relevance proportional to magicka shortfall
;   Allow     - Keep at full relevance

sUncastableSpellPolicy = Disallow
fUncastablePenaltyFloor = 0.05

; =============================================================================
; SOUL GEM RECHARGING
; =============================================================================
; When enabled, filled soul gems appear as candidates when enchanted weapon
; charge is low. Activating a soul gem recommendation recharges the weapon.

bEnableSoulGemRecharge = true


[Scoring]
; =============================================================================
; UTILITY SCORING PARAMETERS
; =============================================================================
; Formula: utility = contextWeight × (1 + λ(confidence) × learningScore)
;                    × correlationBonus × potionMultiplier × favoritesMultiplier
; Where λ(confidence) = lambdaMin + confidence × (lambdaMax - lambdaMin)
;
; Context acts as gate: zero context = zero utility regardless of learning.
; =============================================================================

; --- Core Scoring ---

; fLambdaMin: Learning weight at zero confidence (cold start)
;   Range: 0.0 - 2.0
fLambdaMin = 0.5

; fLambdaMax: Learning weight at full confidence (well-trained)
;   Range: 1.0 - 5.0
fLambdaMax = 3.0

; fExplorationWeight (beta): UCB exploration bonus for untried items
;   Range: 0.0 - 1.0
fExplorationWeight = 0.2

; --- Correlation Bonuses ---
; Equipment synergy bonuses applied when item+equipment combinations are detected.

fBowArrowBonus = 2.0
fCrossbowBoltBonus = 2.0
fMeleeDefensiveBonus = 1.5
fSilverUndeadBonus = 2.0
fFortifySchoolBonus = 2.0
fStaffLowMagickaBonus = 1.5
fTwoHandedDefensiveBonus = 1.2

; --- Potion Discrimination ---
; Controls how potions are ranked based on combat timing and magnitude.

fCombatStartWindow = 10.0
fRegenPotionCombatStartMult = 1.5
fFlatRestoreLowResourceMult = 1.5
fMagnitudeValueScale = 0.3

; --- Scoring Thresholds ---

fMinimumUtility = 0.1
fMinimumContextWeight = 0.05

; fColdStartUCBBoost: Context weight floor for untried items during cold start.
;   Range: 0.0 - 1.0
fColdStartUCBBoost = 0.2

; --- Performance ---

iMaxCandidatesPerCycle = 500
iTopNCandidates = 10


[Favorites]
; =============================================================================
; FAVORITES HANDLING
; =============================================================================
; sFavoritesMode: How to handle favorited items
;   Boost    - Favorited items get a utility multiplier (default)
;   Off      - Ignore favorites flag entirely
;   Suppress - Skip favorited items (they're already in your favorites menu)

sFavoritesMode = Boost
fFavoritesBoostMin = 1.3
fFavoritesBoostMax = 2.5


[ContextWeights]
; =============================================================================
; CONTEXT WEIGHT MULTIPLIERS
; =============================================================================
; These weights control how strongly each condition influences recommendations.
; =============================================================================

; --- Elemental / Status Effects ---
fWeightOnFire = 8.0
fWeightPoisoned = 6.0
fWeightFrozen = 8.0
fWeightShocked = 8.0
fWeightDiseased = 3.0

; --- Environmental ---
fWeightUnderwater = 10.0
fWeightFallingHigh = 8.0
fWeightLookingAtLock = 10.0

; --- Weapon Charge ---
fWeightWeaponChargeModerate = 5.0
fWeightWeaponChargeLow = 6.0
fWeightWeaponChargeCritical = 9.0

; --- Active Buff Suppression ---
; Negative weights suppress re-casting buffs the player already has active.

fWeightHasWaterbreathing = -10.0
fWeightHasInvisibility = -10.0
fWeightHasMuffle = -8.0
fWeightHasArmorBuff = -5.0
fWeightHasCloak = -8.0
fWeightHasSummon = -6.0

; =============================================================================
; NORMALIZED CONTEXT WEIGHTS [0,1] for ContextRuleEngine
; =============================================================================
; Formula: weight = (1 - vitalPct)^exponent
; =============================================================================

; --- Health/Resource Restoration ---
fWeightCriticalHealth = 1.0
fWeightLowHealth = 0.5
fWeightLowMagicka = 0.4
fWeightLowStamina = 0.3

; --- Combat/Tactical ---
fWeightInCombat = 0.3
fWeightMultipleEnemies = 0.5
fWeightEnemyCasting = 0.7
fWeightSneaking = 0.4

; --- Workstations ---
fWeightAtForge = 0.8
fWeightAtEnchanter = 0.8
fWeightAtAlchemyLab = 0.8

; --- Target-Specific ---
fWeightTargetUndead = 0.6
fWeightTargetDaedra = 0.6
fWeightTargetDragon = 0.5

; --- Equipment ---
fWeightNeedsAmmo = 0.5
fWeightNoWeapon = 0.4
fWeightWeapon = 0.2
fWeightSpell = 0.2

; --- Utility Baseline ---
fWeightBaseRelevance = 0.05

; --- Smoothing Exponents ---
; Controls shape of continuous weight curves: weight = (1 - vitalPct)^exponent
;   1.0 = linear, 2.0 = quadratic (default), 3.0 = cubic (steep)
fHealthSmoothingExponent = 2.0
fMagickaSmoothingExponent = 2.0
fStaminaSmoothingExponent = 1.5


[Wildcards]
; =============================================================================
; WILDCARD EXPLORATION
; =============================================================================
; Wildcards let untried or lower-scored items occasionally appear in slots,
; promoting exploration so the learner can discover your preferences.
;
; Probability model: P(slot i) = fBaseProbability * i, capped at fMaxProbability.
; Slot 0 is always excluded (top-scored pick).

fBaseProbability = 0.165
fMaxProbability = 0.5
fCooldownSeconds = 30
fRefractorySeconds = 60


[Subtexts]
; =============================================================================
; WHEELER ENTRY LABELS (v2 API only)
; =============================================================================
; Small text labels shown below items in Wheeler wheel entries.
; Priority order: Override > Lock Timer > Wildcard > Explanation

bShowWildcardLabel = true
sWildcardLabelText = Wildcard
bShowOverrideLabel = true
bShowLockTimerLabel = false
bLockTimerShowSeconds = true
sLockTimerPrefix = Locked
bShowExplanationLabel = true
fOffsetX = 115
fOffsetY = 80


[Wheeler]
; =============================================================================
; WHEELER INTEGRATION
; =============================================================================

; sWheelPosition: Where Huginn wheels appear in the Wheeler wheel list
;   First = First wheel (immediately visible when opening Wheeler)
;   Last  = Last wheel (append after all other wheels)
;   <number> = Specific index (e.g., 2 = third wheel)
sWheelPosition = First

; bAutoFocusOnOpen: Auto-navigate to Huginn wheel when Wheeler opens
bAutoFocusOnOpen = true

; bAutoFocusOnOverride: Navigate to Huginn wheel when override fires
bAutoFocusOnOverride = true

; iAutoFocusMinPriority: Minimum override priority to trigger auto-focus
;   DROWNING=50, CRITICAL_MAGICKA=70, CRITICAL_HEALTH=100
iAutoFocusMinPriority = 50

; sPostActivationPolicy: What happens after player activates a slot's item
;   Backfill = Replace with next-best candidate (default)
;   Sticky   = Keep item visible until context changes
;   Empty    = Clear slot and show "Equipped" label
sPostActivationPolicy = Backfill


; =============================================================================
; SLOT PAGES
; =============================================================================
; Each page becomes a separate Wheeler wheel and Intuition widget page.
;
; Available classifications:
;   DamageAny, HealingAny, BuffsAny, DefensiveAny, SummonsAny, Utility,
;   PotionsAny, ScrollsAny, SpellsAny, SpellsDestruction, SpellsRestoration,
;   SpellsConjuration, SpellsIllusion, SpellsAlteration,
;   WeaponsAny, WeaponsMelee, WeaponsRanged, FoodAny, AmmoAny, Regular
;
; Slot settings:
;   sClassification   - What items can fill this slot
;   bWildcardsEnabled - Allow exploration picks in this slot
;   bOverridesEnabled - Override policy: Any/None/HP/MP/SP
;   bSkipEquipped     - Skip already-equipped items (show alternatives)
;   iPriority         - Fill order (higher = filled first)
; =============================================================================

[Pages]
iPageCount = 3

; =============================================================================
; PAGE 0 - "Smart" (role-based recommendations)
; =============================================================================
; Typed slots for common roles (damage, weapons, buffs) plus Regular overflow.
; Overrides pinned: HP on damage, MP on weapons, SP on buffs.

[Page0]
sName = Smart
iSlotCount = 8

[Page0.Slot0]
sClassification = DamageAny
bWildcardsEnabled = true
bOverridesEnabled = HP
iPriority = 6

[Page0.Slot1]
sClassification = WeaponsAny
bWildcardsEnabled = true
bOverridesEnabled = MP
iPriority = 5

[Page0.Slot2]
sClassification = BuffsAny
bWildcardsEnabled = true
bOverridesEnabled = SP
iPriority = 4

[Page0.Slot3]
sClassification = Regular
bWildcardsEnabled = true
bOverridesEnabled = None
iPriority = 3

[Page0.Slot4]
sClassification = Regular
bWildcardsEnabled = true
bOverridesEnabled = None
iPriority = 2

[Page0.Slot5]
sClassification = Regular
bWildcardsEnabled = true
bOverridesEnabled = None
iPriority = 1

[Page0.Slot6]
sClassification = Regular
bWildcardsEnabled = true
bOverridesEnabled = None
iPriority = 1

[Page0.Slot7]
sClassification = Regular
bWildcardsEnabled = true
bOverridesEnabled = None
iPriority = 0

